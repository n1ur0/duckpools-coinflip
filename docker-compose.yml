# =============================================================================
# DuckPools Coinflip - Development Docker Compose
# =============================================================================
#
# This file defines the full development stack:
# - Backend API (FastAPI) with hot-reload
# - Frontend (React + Vite) with hot-reload
# - Off-chain Bot for bet resolution with hot-reload
# - External Ergo node (not included in this compose)
#
# Usage:
#   docker-compose up              # Start all services in development mode
#   docker-compose up -d           # Start in background
#   docker-compose down            # Stop and remove containers
#   docker-compose logs -f         # Follow logs
#
# For production builds, use the individual Dockerfiles:
#   docker build -t duckpools-backend --target production backend/
#   docker build -t duckpools-frontend --target production frontend/
# =============================================================================

version: '3.8'

services:
  # Backend API Service (FastAPI)
  backend:
    build:
      context: ./backend
      target: development  # Use development stage with hot-reload
    container_name: duckpools-backend-dev
    ports:
      - "8000:8000"  # API port
    environment:
      # Backend configuration
      - NODE_ENV=development
      - LOG_LEVEL=DEBUG
# Ergo node configuration (external)
      - ERGO_NODE_URL=http://host.docker.internal:9052
      - ERGO_API_KEY=${ERGO_API_KEY:-blake2bhash}
      # Frontend URL for CORS
      - FRONTEND_URL=http://localhost:3000
    volumes:
      # Mount backend code for hot-reload
      - ./backend:/app
      - ./.env:/app/.env:ro  # Mount .env file (read-only) for environment variables
      - backend_logs:/app/logs  # Persistent logs
    networks:
      - duckpools-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on: []  # No internal dependencies, ergo node is external

  # Frontend Service (React + Vite)
  frontend:
    build:
      context: ./frontend
      target: development  # Use development stage with hot-reload
    container_name: duckpools-frontend-dev
    ports:
      - "3000:3000"  # Frontend dev server
      - "24678:24678"  # Vite HMR port
    environment:
      # Frontend configuration
      - VITE_API_ENDPOINT=http://localhost:8000
      - VITE_ERGO_NODE_URL=http://localhost:9052
      # Enable polling for hot-reload in Docker
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    volumes:
      # Mount frontend code for hot-reload
      - ./frontend:/app
      - /app/node_modules  # Exclude node_modules from host
      - /app/.vite  # Exclude Vite cache
    networks:
      - duckpools-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      - backend  # Start backend first

  # Off-chain Bot Service
  off-chain-bot:
    build:
      context: ./off-chain-bot
      target: development  # Use development stage with hot-reload
    container_name: duckpools-offchain-bot-dev
    environment:
      # Bot configuration
      - NODE_ENV=development
      - LOG_LEVEL=DEBUG
# Ergo node configuration (external)
      - ERGO_NODE_URL=http://host.docker.internal:9052
      - ERGO_API_KEY=${ERGO_API_KEY:-blake2bhash}
    volumes:
      # Mount bot code for hot-reload
      - ./off-chain-bot:/app
      - ./.env:/app/.env:ro  # Mount .env file (read-only) for environment variables
      - bot_logs:/app/logs  # Persistent logs
    networks:
      - duckpools-network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]  # Check if the bot process is running
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      - backend  # Start backend first

# Network configuration
networks:
  duckpools-network:
    driver: bridge

# Volume configuration for logs
volumes:
  backend_logs:
    name: duckpools-backend-logs
  bot_logs:
    name: duckpools-bot-logs