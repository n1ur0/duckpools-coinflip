# ==============================================================================
# DuckPools Coinflip - Development Docker Compose
# ==============================================================================
#
# This file defines the full development stack:
# - Backend API (FastAPI) with hot-reload
# - Frontend (React + Vite) with hot-reload
# - Off-chain Bot (Python) for bet resolution
# - External Ergo node (not included in this compose)
#
# Usage:
#   docker compose up              # Start all services in development mode
#   docker compose up -d           # Start in background
#   docker compose down            # Stop and remove containers
#   docker compose logs -f         # Follow logs
#
# For production builds, use the individual Dockerfiles:
#   docker build -t duckpools-backend --target production backend/
#   docker build -t duckpools-frontend --target production frontend/
# ==============================================================================

version: '3.8'

services:
  # Backend API Service (FastAPI)
  backend-api:
    build:
      context: ./backend
      target: development  # Use development stage with hot-reload
    container_name: duckpools-backend-dev
    ports:
      - "8000:8000"  # API port
    environment:
      # Backend configuration
      - NODE_ENV=development
      # Ergo node configuration (external)
      - ERGO_NODE_URL=http://host.docker.internal:9052
      - ERGO_API_KEY=blake2b256("hello")
      # Default CORS origin (can be overridden in docker-compose.override.yml)
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      # Default volumes (can be extended in docker-compose.override.yml)
      - ./backend:/app
    networks:
      - coinflip-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on: []  # No internal dependencies, ergo node is external

  # Frontend Service (React + Vite)
  frontend:
    build:
      context: ./frontend
      target: development  # Use development stage with hot-reload
    container_name: duckpools-frontend-dev
    ports:
      - "3000:3000"  # Frontend dev server
      - "24678:24678"  # Vite HMR port
    environment:
      # Frontend configuration (can be overridden in docker-compose.override.yml)
      - VITE_API_ENDPOINT=http://localhost:8000
      - VITE_ERGO_NODE_URL=http://localhost:9052
    volumes:
      # Default volumes (can be extended in docker-compose.override.yml)
      - ./frontend:/app
    networks:
      - coinflip-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      - backend-api  # Start backend first

  

# Network configuration (can be overridden in docker-compose.override.yml)
networks:
  coinflip-net:
    driver: bridge
    name: duckpools-network