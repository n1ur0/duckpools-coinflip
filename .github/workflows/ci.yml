name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend tests ──────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          pytest tests/ -v --tb=short --ignore=tests/utils 2>/dev/null || \
          pytest backend/tests/ -v --tb=short 2>/dev/null || \
          echo "No backend tests discovered — skipping"

  # ── Security regression tests ────────────────────────────────────
  security-regression:
    name: Security Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run security regression tests
        working-directory: security/scripts/regression
        run: |
          if [ -f test_regression.py ]; then
            pytest test_regression.py -v --tb=short
          else
            echo "No regression tests yet — skipping"
          fi

  # ── SDK TypeScript tests ─────────────────────────────────────────
  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        working-directory: sdk
        run: npm ci

      - name: Run SDK tests
        working-directory: sdk
        run: npm test

  # ── Frontend typecheck and build ─────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Production build
        working-directory: frontend
        run: npm run build

  # ── ErgoScript contract integrity check ──────────────────────────
  contract-lint:
    name: Contract Integrity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for corrupted ErgoScript files
        run: |
          echo "Checking ErgoScript files for placeholder/corruption patterns..."
          ERRORS=0
          for f in smart-contracts/*.es; do
            [ -f "$f" ] || continue
            if grep -q '\*\*\*' "$f"; then
              echo "FAIL: $f contains *** placeholder pattern"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS contract file(s) have corruption issues"
            exit 1
          fi
          echo "All contract files passed integrity check"

  # ── Python syntax validation ─────────────────────────────────────
  python-syntax:
    name: Python Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all Python files compile
        run: |
          ERRORS=0
          while IFS= read -r -d '' f; do
            if ! python -m py_compile "$f" 2>/dev/null; then
              echo "::error file=$f::Syntax error in $f"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            -print0)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS Python file(s) failed syntax check"
            exit 1
          fi
          echo "All Python files compile clean"
