name: Security Scan

on:
  push:
    branches: [main, dev, feature/*, fix/*]
  pull_request:
    branches: [main, dev]
  schedule:
    # Run security scans daily at 2:00 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        audit-type: [npm, pip]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: matrix.audit-type == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        if: matrix.audit-type == 'pip'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install npm dependencies
        if: matrix.audit-type == 'npm'
        run: |
          cd frontend
          npm ci

      - name: Install pip dependencies
        if: matrix.audit-type == 'pip'
        run: |
          cd backend
          pip install -r requirements.txt
          pip install safety bandit

      - name: Run npm audit
        if: matrix.audit-type == 'npm'
        run: |
          cd frontend
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run pip safety check
        if: matrix.audit-type == 'pip'
        run: |
          cd backend
          safety check --json --output safety-report.json || true
        continue-on-error: true

      - name: Upload safety report
        if: matrix.audit-type == 'pip'
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: backend/safety-report.json
          retention-days: 30

  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
          verbose: true
        continue-on-error: true

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: branch
          branch: main
          extra_args: --only-verified
        continue-on-error: true

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        analysis-type: [semgrep, codeql, bandit]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        if: matrix.analysis-type == 'bandit'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: matrix.analysis-type == 'bandit'
        run: |
          cd backend
          pip install -r requirements.txt
          pip install bandit

      - name: Initialize CodeQL
        if: matrix.analysis-type == 'codeql'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
        continue-on-error: true

      - name: Autobuild
        if: matrix.analysis-type == 'codeql'
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        if: matrix.analysis-type == 'codeql'
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

      - name: Run Semgrep
        if: matrix.analysis-type == 'semgrep'
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
          publish-token: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Run Bandit
        if: matrix.analysis-type == 'bandit'
        run: |
          cd backend
          bandit -r . -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Upload Bandit report
        if: matrix.analysis-type == 'bandit'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 30

  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[docker]') || contains(github.event.pull_request.title, 'docker')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t duckpools-coinflip:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'duckpools-coinflip:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  generate-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-detection, static-analysis, container-security]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Create Security Summary
        run: |
          echo "# Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "Generated on: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
          echo "- npm audit: Check job logs for details" >> $GITHUB_STEP_SUMMARY
          echo "- pip safety: Check safety-report artifact for details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Secret Detection" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: Check job logs for details" >> $GITHUB_STEP_SUMMARY
          echo "- TruffleHog: Check job logs for details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Static Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep: Check job logs for details" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL: Check Security tab for details" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit: Check bandit-report artifact for details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Container Security" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy: Check Security tab for details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- All jobs are set to continue on error to not block CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "- Security team should review findings regularly" >> $GITHUB_STEP_SUMMARY
          echo "- Critical issues should be addressed with high priority" >> $GITHUB_STEP_SUMMARY